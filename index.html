<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="QueueMaster">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueMaster - QR Token System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons for UI Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- QR Scanner (staff side only) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <style>
        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* html5-qrcode scanner custom styling to match Tailwind UI */
        #reader { 
            border: none !important; 
            background: #0f172a; /* slate-900 */
            border-radius: 0.75rem;
            overflow: hidden;
        }
        #reader video {
            object-fit: cover;
            border-radius: 0.75rem;
        }
        #reader button { 
            background-color: #4f46e5 !important; /* indigo-600 */
            color: white !important; 
            padding: 8px 16px !important; 
            border-radius: 0.5rem !important;
            border: none !important;
            margin: 8px 4px !important;
            font-weight: 600 !important;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #reader button:hover {
            background-color: #4338ca !important; /* indigo-700 */
        }
        #reader select {
            padding: 8px !important;
            border-radius: 0.5rem !important;
            border: 1px solid #cbd5e1 !important;
            margin-bottom: 12px !important;
            width: 100%;
        }
        #reader a { display: none !important; } /* Hide library branding link for cleaner UI */
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-slate-200 px-6 py-4 flex justify-between items-center relative z-10">
        <div class="flex items-center gap-2 cursor-pointer" onclick="switchView('view-home')">
            <i class="ph ph-ticket text-3xl text-indigo-600"></i>
            <h1 class="text-xl font-bold tracking-tight text-slate-800">QueueMaster</h1>
        </div>
        <button id="nav-home-btn" onclick="switchView('view-home')" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg font-medium transition flex items-center gap-2">
            <i class="ph ph-house"></i> Home
        </button>
    </nav>

    <!-- Main Content Container -->
    <main class="flex-grow flex flex-col relative w-full h-full">
        
        <!-- ================= VIEW: HOME SELECTION ================= -->
        <div id="view-home" class="view-section flex-grow flex flex-col items-center justify-center p-6 w-full max-w-4xl mx-auto animate-fade-in">
            <div class="text-center mb-12">
                <h2 class="text-4xl md:text-5xl font-black text-slate-800 mb-4 tracking-tight">Select Your Role</h2>
                <p class="text-lg text-slate-500">Choose a portal to proceed into the system.</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 md:gap-10 w-full max-w-3xl">
                <!-- Customer Role Card -->
                <button onclick="switchView('view-customer')" class="bg-white group hover:border-indigo-500 border-2 border-transparent p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-5 focus:outline-none focus:ring-4 focus:ring-indigo-500/20">
                    <div class="bg-indigo-50 text-indigo-600 p-8 rounded-full group-hover:scale-110 transition-transform duration-300">
                        <i class="ph ph-user text-6xl"></i>
                    </div>
                    <div class="text-center">
                        <h3 class="text-2xl font-bold text-slate-800 mb-1">Customer Portal</h3>
                        <p class="text-slate-500">Get your queue token & QR</p>
                    </div>
                </button>

                <!-- Staff Role Card -->
                <button onclick="switchView('view-staff')" class="bg-white group hover:border-emerald-500 border-2 border-transparent p-10 rounded-3xl shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col items-center gap-5 focus:outline-none focus:ring-4 focus:ring-emerald-500/20">
                    <div class="bg-emerald-50 text-emerald-600 p-8 rounded-full group-hover:scale-110 transition-transform duration-300">
                        <i class="ph ph-users-three text-6xl"></i>
                    </div>
                    <div class="text-center">
                        <h3 class="text-2xl font-bold text-slate-800 mb-1">Staff Dashboard</h3>
                        <p class="text-slate-500">Manage queue & scan QR codes</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- ================= VIEW: CUSTOMER PORTAL ================= -->
        <div id="view-customer" class="view-section hidden flex-grow flex flex-col items-center p-6 w-full max-w-4xl mx-auto animate-fade-in overflow-y-auto">
            
            <!-- REAL WORLD: "Now Serving" Digital Board -->
            <div id="now-serving-board" class="hidden w-full max-w-2xl bg-gradient-to-br from-emerald-500 to-teal-600 text-white p-8 rounded-3xl shadow-2xl mb-8 text-center border-4 border-emerald-400/30">
                <p class="text-emerald-100 font-bold uppercase tracking-[0.2em] text-sm mb-2 flex items-center justify-center gap-2">
                    <i class="ph ph-speaker-high text-xl"></i> Now Serving
                </p>
                <h2 class="text-6xl md:text-7xl font-black tracking-tighter drop-shadow-md" id="now-serving-token">---</h2>
            </div>

            <div class="bg-white w-full max-w-2xl p-8 rounded-3xl shadow-xl border border-slate-100 text-center relative mb-8">
                <!-- Decorative top bar -->
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                
                <h2 class="text-3xl font-bold text-slate-800 mb-2">Welcome</h2>
                <p class="text-slate-500 mb-8">Tap below to join the waitlist</p>
                
                <!-- Action Area -->
                <div id="customer-action-area">
                    <button onclick="generateToken()" class="w-full bg-indigo-600 text-white text-xl font-bold py-6 rounded-2xl hover:bg-indigo-700 hover:shadow-lg hover:-translate-y-1 transition-all flex items-center justify-center gap-3">
                        <i class="ph ph-ticket text-3xl"></i> Get Token
                    </button>
                </div>
            </div>

            <!-- List Area (For Multiple User Testing) -->
            <div class="w-full max-w-2xl">
                <h3 id="tokens-list-title" class="text-xl font-bold text-slate-700 mb-4 px-2 hidden">Your Test Tokens</h3>
                <div id="customer-tokens-list" class="flex flex-col gap-4">
                    <!-- Tokens will be injected here automatically from state -->
                </div>
            </div>
        </div>

        <!-- ================= VIEW: STAFF DASHBOARD ================= -->
        <div id="view-staff" class="view-section hidden flex-grow flex flex-col p-6 w-full max-w-7xl mx-auto animate-fade-in">
            
            <!-- Dashboard Header & Actions -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <div>
                    <h2 class="text-3xl font-black text-slate-800 tracking-tight">Queue Management</h2>
                    <p class="text-slate-500 mt-1">Process customers and update token statuses</p>
                </div>
                
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <!-- Metric Box -->
                    <div class="bg-slate-50 px-6 py-3 rounded-xl border border-slate-200 flex items-center gap-4">
                        <div class="bg-orange-100 text-orange-600 p-2.5 rounded-lg">
                            <i class="ph ph-users text-2xl"></i>
                        </div>
                        <div>
                            <p class="text-xs text-slate-500 font-bold uppercase tracking-wide">Waiting</p>
                            <p id="pending-count" class="text-2xl font-black text-slate-800 leading-none">0</p>
                        </div>
                    </div>
                    
                    <!-- Scan Button -->

                        <i class="ph ph-qr-code text-2xl"></i> Scan QR
                    </button>
                </div>
            </div>

            <!-- Dynamic Token Grid -->
            <div id="pending-token-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Tokens will be injected here via JavaScript -->
            </div>
        </div>
    </main>

    <!-- ================= MODALS & TOASTS ================= -->

    <!-- Scanner Modal -->
    <div id="scanner-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-all">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-xl text-slate-800 flex items-center gap-3">
                    <div class="bg-emerald-100 p-2 rounded-lg"><i class="ph ph-scan text-2xl text-emerald-600"></i></div>
                    Scan Token
                </h3>
                <button onclick="closeScanner()" class="text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-full p-2 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-6 bg-slate-100">
                <!-- The html5-qrcode library injects the video element here -->
                <div id="reader" class="w-full shadow-inner bg-slate-900"></div>
                <p class="text-center text-sm font-medium text-slate-500 mt-5 flex items-center justify-center gap-2">
                    <i class="ph ph-camera"></i> Point camera at customer's QR code
                </p>
            </div>
        </div>
    </div>

    <!-- Action Confirmation Modal (Triggered after successful scan) -->
    <div id="action-modal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4 animate-fade-in">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center relative">
            <div class="mx-auto w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mb-6 shadow-inner">
                <i class="ph ph-ticket text-4xl"></i>
            </div>
            <h3 class="text-slate-500 mb-2 font-medium text-lg">Process Scanned Token</h3>
            <div id="action-token-id" class="text-5xl font-black text-slate-800 mb-8 tracking-tighter"></div>
            
            <div class="flex flex-col gap-3">
                <button id="btn-serve-scan" class="w-full bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg hover:bg-emerald-600 transition shadow-sm hover:shadow-md flex justify-center items-center gap-2">
                    <i class="ph ph-check-circle text-xl"></i> Mark as Served
                </button>
                <button id="btn-cancel-scan" class="w-full bg-red-50 text-red-600 py-4 rounded-xl font-bold text-lg hover:bg-red-100 transition flex justify-center items-center gap-2">
                    <i class="ph ph-x-circle text-xl"></i> Cancel Token
                </button>
                <div class="w-full h-px bg-slate-100 my-2"></div>
                <button onclick="closeActionModal()" class="w-full text-slate-500 py-3 rounded-xl font-bold hover:bg-slate-50 hover:text-slate-700 transition">
                    Close
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 flex flex-col gap-3 z-[100] pointer-events-none"></div>

    <!-- ================= JAVASCRIPT LOGIC ================= -->
    <script type="module">
        // =========================================================
        // SUPABASE CONFIG — replace with your project values
        // =========================================================
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

        const SUPABASE_URL  = 'https://nmhgacobkhlhbotsjzzj.supabase.co';         // e.g. https://xxxx.supabase.co
        const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5taGdhY29ia2hsaGJvdHNqenpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MjY4OTQsImV4cCI6MjA5NTUwMjg5NH0.KBAXXQbQG32MMf64WJ-Kh5MfzQ0I4Ce4U9LnPUU8JqU';    // safe to expose in browser

        // VAPID public key — generate once with: npx web-push generate-vapid-keys
        // Then paste the PUBLIC key here.
        const VAPID_PUBLIC_KEY = 'BDhYUfh3f7BH8sWccVdW-W28BYlT6P-9FGmNopulDO2BahEIpZnJ1iW-uTPEF2yLGQc6YpHyFPAecLISo95egrY';

        // =========================================================
        // Supabase Edge Function URL that sends Web Push payloads.
        // Deploy the function from supabase/functions/send-push/
        // =========================================================
        const PUSH_FUNCTION_URL = `${SUPABASE_URL}/functions/v1/send-push`;

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

        // --- App State ---
        let appState = {
            tokens: [],
            nextNumber: 1001,
            updateCounter: 0,
            lastCalledToken: null,
            lastCalledAction: null,
            currentNextInLine: null
        };
        let sessionTokenCount = 0;
        let html5QrcodeScanner = null;
        let myQueueTokenId = null;
        let isInitialSync = true;

        // ── 1. Initialise on page load ────────────────────────────────────────
        window.onload = async () => {
            // Register the service worker (native Web Push, no Firebase)
            if ('serviceWorker' in navigator) {
                try {
                    await navigator.serviceWorker.register('/sw.js');
                } catch (e) { console.error('SW registration error:', e); }
            }

            // Listen for sound-play messages from the SW
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data?.type === 'PLAY_NOTIFICATION_SOUND') {
                    playNotificationSound();
                }
            });

            await initSupabase();
        };

        function playNotificationSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + 0.6);
            } catch (e) {}
        }

        // ── 2. Supabase init: load state + subscribe to realtime ──────────────
        async function initSupabase() {
            // Load initial state
            const { data, error } = await supabase
                .from('queue_state')
                .select('*')
                .eq('id', 'main')
                .single();

            if (data) {
                applyState(data.state);
            } else if (error?.code === 'PGRST116') {
                // Row doesn't exist yet — create it
                await supabase.from('queue_state').insert({ id: 'main', state: appState });
            }

            isInitialSync = false;

            // Subscribe to realtime changes on queue_state
            supabase
                .channel('queue-state-changes')
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'queue_state',
                    filter: 'id=eq.main'
                }, (payload) => {
                    const prevCounter = appState.updateCounter || 0;
                    applyState(payload.new.state);
                    const newCounter = appState.updateCounter || 0;

                    if (!isInitialSync && newCounter > prevCounter) {
                        if (!document.getElementById('view-customer').classList.contains('hidden')) {
                            const newPending = appState.tokens
                                .filter(t => t.status === 'pending')
                                .sort((a, b) => a.timestamp - b.timestamp);
                            triggerCustomerNotifications(appState.lastCalledToken, appState.lastCalledAction, newPending);
                        }
                    }

                    if (!document.getElementById('view-staff').classList.contains('hidden')) renderStaffView();
                    if (!document.getElementById('view-customer').classList.contains('hidden')) renderCustomerView();
                })
                .subscribe();
        }

        function applyState(newState) {
            appState = newState;
            sessionTokenCount = appState.tokens.reduce(
                (max, t) => (t.userNumber > max ? t.userNumber : max), 0
            );
        }

        async function saveState() {
            const { error } = await supabase
                .from('queue_state')
                .upsert({ id: 'main', state: appState });
            if (error) console.error('Supabase save failed:', error);
        }

        // ── 3. Navigation ─────────────────────────────────────────────────────
        window.switchView = function(viewId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');

            const navHomeBtn = document.getElementById('nav-home-btn');
            navHomeBtn.classList.toggle('hidden', viewId === 'view-home');

            if (viewId === 'view-staff')    renderStaffView();
            if (viewId === 'view-customer') renderCustomerView();
        };

        // ── 4. Toast UI ───────────────────────────────────────────────────────
        function showToast(message, type = 'info') {
            const toastContainer = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const typeConfig = {
                success: { bg: 'bg-emerald-600', icon: '<i class="ph ph-check-circle text-2xl"></i>' },
                error:   { bg: 'bg-red-600',     icon: '<i class="ph ph-warning-circle text-2xl"></i>' },
                info:    { bg: 'bg-indigo-600',   icon: '<i class="ph ph-info text-2xl"></i>' }
            };

            toast.className = `${typeConfig[type].bg} text-white px-5 py-4 rounded-xl shadow-2xl flex items-center gap-3 transform transition-all duration-300 translate-y-8 opacity-0 pointer-events-auto w-max max-w-sm`;
            toast.innerHTML = `${typeConfig[type].icon} <span class="font-medium">${message}</span>`;

            toastContainer.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-8', 'opacity-0'));
            setTimeout(() => {
                toast.classList.add('translate-y-8', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // ── 5. Push notifications ─────────────────────────────────────────────
        async function triggerCustomerNotifications(calledTokenId, action, newPendingList) {
            if (action === 'served' && calledTokenId) {
                const board = document.getElementById('now-serving-board');
                board.classList.remove('hidden', 'animate-pop-in');
                void board.offsetWidth;
                board.classList.add('animate-pop-in');
                document.getElementById('now-serving-token').textContent = calledTokenId;
            }

            const targets = newPendingList.slice(0, 3);
            const delayStart = action === 'served' ? 3000 : 500;

            targets.forEach((token, index) => {
                setTimeout(async () => {
                    let title, body;
                    if (index === 0) {
                        title = "You're Next!";
                        body  = `Token ${token.id} — please make your way to the counter now.`;
                    } else if (index === 1) {
                        title = "Almost Your Turn";
                        body  = `Token ${token.id} — 1 person ahead. Arrive within 5 minutes.`;
                    } else {
                        title = "Queue Update";
                        body  = `Token ${token.id} — 2 people ahead. Head over soon.`;
                    }

                    // Look up the stored Web Push subscription for this token
                    const { data: sub, error: subErr } = await supabase
                        .from('push_subscriptions')
                        .select('subscription')
                        .eq('queue_token_id', token.id)
                        .single();

                    console.log('[Push] Subscription lookup for', token.id, '→', sub ? 'FOUND' : 'NOT FOUND', subErr?.message || '');
                    if (!sub) return; // customer never granted permission

                    // Call the Edge Function to actually deliver the push
                    try {
                        const pushRes = await fetch(PUSH_FUNCTION_URL, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${SUPABASE_ANON}`
                            },
                            body: JSON.stringify({
                                subscription: sub.subscription,
                                title,
                                body
                            })
                        });
                        if (!pushRes.ok) {
                            const err = await pushRes.text();
                            console.error('Push function error:', pushRes.status, err);
                        } else {
                            console.log('Push sent successfully for', token.id);
                        }
                    } catch (e) { console.warn('Push send failed:', e); }

                }, delayStart + index * 800);
            });
        }

        // ── 6. Customer Portal ────────────────────────────────────────────────
        window.generateToken = async function() {
            const tokenId = `T-${appState.nextNumber}`;
            appState.nextNumber++;
            sessionTokenCount++;
            appState.updateCounter = (appState.updateCounter || 0) + 1;

            appState.tokens.push({
                id: tokenId,
                status: 'pending',
                timestamp: Date.now(),
                userNumber: sessionTokenCount
            });

            const pending = appState.tokens
                .filter(t => t.status === 'pending')
                .sort((a, b) => a.timestamp - b.timestamp);
            appState.currentNextInLine = pending.length > 0 ? pending[0].id : null;
            myQueueTokenId = tokenId;

            const myTokens = JSON.parse(sessionStorage.getItem('myTokenIds') || '[]');
            myTokens.push(tokenId);
            sessionStorage.setItem('myTokenIds', JSON.stringify(myTokens));

            await saveState();
            showToast(`Token ${tokenId} generated for User ${sessionTokenCount}`, 'success');

            await setupNotificationsForToken(tokenId);
        };

        async function setupNotificationsForToken(queueTokenId) {
            if (!('Notification' in window) || !('PushManager' in window)) {
                showToast('Push notifications not supported in this browser.', 'error');
                return;
            }

            const permission = await Notification.requestPermission();
            if (permission !== 'granted') {
                showToast('Notifications blocked — enable in browser settings.', 'error');
                return;
            }

            try {
                const reg = await navigator.serviceWorker.ready;

                // Convert the VAPID public key string to Uint8Array
                const appServerKey = urlBase64ToUint8Array(VAPID_PUBLIC_KEY);

                // Subscribe using the native Web Push API
                const subscription = await reg.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: appServerKey
                });

                // Persist the subscription in Supabase so the Edge Function can use it
                const { error } = await supabase.from('push_subscriptions').upsert({
                    queue_token_id: queueTokenId,
                    subscription: subscription.toJSON(),
                    created_at: new Date().toISOString()
                });

                if (error) throw error;

                showToast('Push notifications enabled on this device!', 'success');
            } catch (e) {
                console.warn('Push subscribe failed:', e);
                showToast('Could not enable push notifications.', 'error');
            }
        }

        /** Converts a URL-safe base64 string to Uint8Array (required by pushManager.subscribe) */
        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = atob(base64);
            return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
        }

        // ── 7. Render: Customer View ──────────────────────────────────────────
        function renderCustomerView() {
            const list = document.getElementById('customer-tokens-list');
            list.innerHTML = '';

            const myTokenIds = JSON.parse(sessionStorage.getItem('myTokenIds') || '[]');
            const allTokens = [...appState.tokens].reverse();
            const displayTokens = myTokenIds.length > 0
                ? allTokens.filter(t => myTokenIds.includes(t.id))
                : [];

            const pendingTokensList = appState.tokens
                .filter(t => t.status === 'pending')
                .sort((a, b) => a.timestamp - b.timestamp);

            document.getElementById('tokens-list-title').classList.toggle('hidden', displayTokens.length === 0);

            displayTokens.forEach((token) => {
                const card = document.createElement('div');

                let statusBadge = '';
                let cardBorder = 'border-slate-200';
                let tokenColor = 'text-slate-800';

                if (token.status === 'pending') {
                    const pos = pendingTokensList.findIndex(pt => pt.id === token.id);
                    let posLabel = '';
                    if (pos === 0) {
                        posLabel = `<span class="bg-amber-100 text-amber-700 text-sm font-bold px-3 py-1 rounded-full border border-amber-200 animate-pulse">Next in Line!</span>`;
                        cardBorder = 'border-amber-300';
                    } else if (pos > 0) {
                        posLabel = `<span class="bg-slate-100 text-slate-600 text-sm font-bold px-3 py-1 rounded-full border border-slate-200">${pos} person(s) ahead</span>`;
                    }
                    statusBadge = `
                        <div class="flex items-center gap-2 mt-3 flex-wrap">
                            <span class="text-slate-500 text-sm flex items-center gap-1"><i class="ph ph-clock text-indigo-500"></i> Active in queue</span>
                            ${posLabel}
                        </div>`;
                } else if (token.status === 'served') {
                    statusBadge = `<div class="mt-3"><span class="text-emerald-600 text-sm font-bold flex items-center gap-1"><i class="ph ph-check-circle"></i> Served</span></div>`;
                    cardBorder = 'border-emerald-200';
                    tokenColor = 'text-slate-400 line-through';
                } else if (token.status === 'canceled') {
                    statusBadge = `<div class="mt-3"><span class="text-red-500 text-sm font-bold flex items-center gap-1"><i class="ph ph-x-circle"></i> Canceled</span></div>`;
                    cardBorder = 'border-red-200';
                    tokenColor = 'text-slate-400 line-through';
                }

                card.className = `bg-white border-2 ${cardBorder} rounded-2xl shadow-sm p-6 animate-fade-in`;
                card.innerHTML = `
                    <p class="text-xs font-bold text-indigo-500 uppercase tracking-widest mb-1">User ${token.userNumber} · Your Token</p>
                    <h3 class="text-5xl font-black tracking-tighter ${tokenColor}">${token.id}</h3>
                    ${statusBadge}
                `;

                list.appendChild(card);
            });
        }

        // ── 8. Render: Staff View ─────────────────────────────────────────────
        function renderStaffView() {
            const list = document.getElementById('pending-token-list');
            list.innerHTML = '';

            const pendingTokens = appState.tokens
                .filter(t => t.status === 'pending')
                .sort((a, b) => a.timestamp - b.timestamp);

            document.getElementById('pending-count').textContent = pendingTokens.length;

            if (pendingTokens.length === 0) {
                list.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center text-slate-400 py-20 bg-white border-2 border-dashed border-slate-200 rounded-3xl">
                        <i class="ph ph-coffee text-6xl mb-4 text-slate-300"></i>
                        <p class="text-xl font-bold text-slate-500 mb-1">No pending tokens</p>
                        <p class="text-sm">The queue is currently empty. You're all caught up!</p>
                    </div>`;
                return;
            }

            pendingTokens.forEach(token => {
                const card = document.createElement('div');
                const timeString = new Date(token.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                card.className = "bg-white border border-slate-100 rounded-2xl shadow-sm p-6 flex flex-col items-center hover:shadow-lg hover:-translate-y-1 transition-all relative overflow-hidden group animate-fade-in";
                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-full h-1.5 bg-indigo-500 opacity-80"></div>
                    <div class="w-full flex justify-between items-center mb-5">
                        <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg tracking-wider">WAITING</span>
                        <span class="text-xs font-semibold text-slate-400 flex items-center gap-1"><i class="ph ph-clock"></i> ${timeString}</span>
                    </div>
                    <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">User ${token.userNumber}</div>
                    <div class="text-5xl font-black text-slate-800 mb-8 tracking-tighter">${token.id}</div>
                    <div class="flex gap-3 w-full mt-auto">
                        <button onclick="updateTokenStatus('${token.id}', 'served')" class="flex-1 bg-emerald-50 text-emerald-700 hover:bg-emerald-500 hover:text-white py-3 rounded-xl font-bold transition-all border border-emerald-100 flex justify-center items-center gap-1.5 shadow-sm">
                            <i class="ph ph-check-circle text-lg"></i> Serve
                        </button>
                        <button onclick="updateTokenStatus('${token.id}', 'canceled')" class="flex-1 bg-red-50 text-red-700 hover:bg-red-500 hover:text-white py-3 rounded-xl font-bold transition-all border border-red-100 flex justify-center items-center gap-1.5 shadow-sm">
                            <i class="ph ph-x-circle text-lg"></i> Cancel
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        window.updateTokenStatus = function(tokenId, newStatus) {
            const index = appState.tokens.findIndex(t => t.id === tokenId);
            if (index !== -1) {
                appState.tokens[index].status = newStatus;

                const newPending = appState.tokens
                    .filter(t => t.status === 'pending')
                    .sort((a, b) => a.timestamp - b.timestamp);

                appState.lastCalledToken = tokenId;
                appState.lastCalledAction = newStatus;
                appState.currentNextInLine = newPending.length > 0 ? newPending[0].id : null;
                appState.updateCounter = (appState.updateCounter || 0) + 1;

                saveState();

                // Always trigger push notifications from staff side directly
                triggerCustomerNotifications(tokenId, newStatus, newPending);

                const verb = newStatus === 'served' ? 'Served' : 'Canceled';
                showToast(`Token ${tokenId} marked as ${verb}`, newStatus === 'served' ? 'success' : 'info');
            }
        };

        // ── 9. QR Scanner ─────────────────────────────────────────────────────
        window.openScanner = function() {
            document.getElementById('scanner-modal').classList.remove('hidden');

            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader",
                { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                false
            );
            html5QrcodeScanner.render(onScanSuccess, () => {});
        };

        window.closeScanner = function() {
            document.getElementById('scanner-modal').classList.add('hidden');
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(err => console.error("Scanner clear error", err));
                html5QrcodeScanner = null;
            }
        };

        function onScanSuccess(decodedText) {
            window.closeScanner();

            const token = appState.tokens.find(t => t.id === decodedText);
            if (!token) {
                showToast(`Invalid Code: ${decodedText} not found in system.`, 'error');
                return;
            }
            if (token.status !== 'pending') {
                showToast(`Token ${decodedText} is already marked as ${token.status}.`, 'error');
                return;
            }

            document.getElementById('action-token-id').textContent = token.id;
            document.getElementById('action-modal').classList.remove('hidden');

            document.getElementById('btn-serve-scan').onclick = () => {
                window.updateTokenStatus(token.id, 'served');
                window.closeActionModal();
            };
            document.getElementById('btn-cancel-scan').onclick = () => {
                window.updateTokenStatus(token.id, 'canceled');
                window.closeActionModal();
            };
        }

        window.closeActionModal = function() {
            document.getElementById('action-modal').classList.add('hidden');
        };

    </script>
</body>
</html>
